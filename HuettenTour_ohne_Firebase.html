function downloadGpx(bookingId,altIndex){
  const f=altIndex!==undefined?GPX_ALT[bookingId]:GPX_FILES[bookingId];
  if(!f)return;
  const bytes=atob(f.data);
  const arr=new Uint8Array(bytes.length);
  for(let i=0;i<bytes.length;i++)arr[i]=bytes.charCodeAt(i);
  const blob=new Blob([arr],{type:"application/gpx+xml"});
  const url=URL.createObjectURL(blob);
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  if(isIOS){
    const w=window.open(url,"_blank");
    if(!w)prompt("GPX-Link kopieren & in neuem Tab öffnen:",url);
  } else {
    const a=document.createElement("a");
    a.href=url;a.download=f.name;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }
}

// ── Warning badge ──
function WarningBadge({rule}){
  const [visible,setVisible]=useState(true);
  const [resolving,setResolving]=useState(false);
  const prev=useRef(rule.isResolved);
  useEffect(()=>{
    if(rule.isResolved&&!prev.current){setResolving(true);const t=setTimeout(()=>setVisible(false),400);return()=>clearTimeout(t);}
    if(!rule.isResolved&&prev.current){setResolving(false);setVisible(true);}
    prev.current=rule.isResolved;
  },[rule.isResolved]);
  if(!visible)return null;
  return(
    <div className={"warning-box"+(resolving?" resolved":"")} style={{background:rule.isResolved?"rgba(74,180,130,0.1)":"rgba(220,80,30,0.06)",border:"1px solid "+(rule.isResolved?"rgba(74,180,130,0.35)":"rgba(220,80,30,0.2)"),borderLeft:"3px solid "+(rule.isResolved?"#4ab480":"#e05020"),borderRadius:8,padding:"7px 10px",fontSize:11,lineHeight:1.5,color:rule.isResolved?"#2a7a50":"#b03010"}}>
      {rule.isResolved&&rule.resolvedMsg?rule.resolvedMsg:"⚠ "+rule.msg}
    </div>
  );
}

// ── Editable field ──
function EditableField({value,multiline,type,color,onSave}){
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState(String(value));
  const ref=useRef();
  useEffect(()=>{if(editing&&ref.current)ref.current.focus();},[editing]);
  function commit(){setEditing(false);const v=type==="number"?Number(draft):draft;onSave(v);}
  const isEmpty=(!value&&value!=="0")||["Unbekannt","Preis unbekannt","Preis unbekannt (Preisliste als Anhang erhalten)"].includes(String(value));
  const inputStyle={background:"#fff",border:"1px solid "+color,borderRadius:6,color:"#1a2e3a",fontFamily:"Georgia,serif",fontSize:12,padding:"5px 8px",width:"100%",boxSizing:"border-box",lineHeight:1.5,resize:"vertical",outline:"none"};
  if(editing){
    return multiline
      ?<textarea ref={ref} rows={3} style={inputStyle} value={draft} onChange={e=>setDraft(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Escape")setEditing(false);}}/>
      :<input ref={ref} type={type||"text"} style={{...inputStyle,resize:"none"}} value={draft} onChange={e=>setDraft(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEditing(false);}}/>;
  }
  return(
    <span onClick={()=>{setDraft(String(value));setEditing(true);}} className="editable-val" title="Klicken zum Bearbeiten"
      style={{fontSize:11.5,lineHeight:1.5,color:isEmpty?"#aabbc8":"#1a2e3a",borderBottomColor:isEmpty?"#c8d8e4":color+"88",minHeight:"24px",display:"inline-block",padding:"2px 0",width:"100%"}}>
      {String(value)||<span style={{color:"#b0c8d8",fontStyle:"italic",fontSize:11}}>Tippen zum Bearbeiten…</span>}
    </span>
  );
}

// ── Main App ──
function App(){
  // Firebase entfernt – App läuft lokal im Browser
  const db = null;
  const [bookings,setBookings]=useState(BASE_BOOKINGS.map(b=>mergeBooking(b,null)));
  const [globalTodos,setGlobalTodos]=useState([]);
  const [newTodo,setNewTodo]=useState({});
  const [newGlobalTodo,setNewGlobalTodo]=useState("");
  const [syncStatus,setSyncStatus]=useState("local");
  const TOTAL=7;

  // ── Lokaler Speicher via localStorage ──
  useEffect(()=>{
    try{
      const saved = localStorage.getItem("huettentour_local_data");
      if(saved){
        const data = JSON.parse(saved);

        if(data.bookings){
          setBookings(BASE_BOOKINGS.map(base=>{
            const local=data.bookings[String(base.id)];
            return mergeBooking(base,local||DEFAULT_MUTABLE[base.id]);
          }));
        }

        if(Array.isArray(data.globalTodos)){
          setGlobalTodos(data.globalTodos);
        }
      }
      setSyncStatus("local");
    } catch(err){
      console.error(err);
      setSyncStatus("error");
    }
  },[]);

  useEffect(()=>{
    try{
      const bookingData = {};
      bookings.forEach(b=>{
        bookingData[String(b.id)] = fbMutableFromBooking(b);
      });

      localStorage.setItem(
        "huettentour_local_data",
        JSON.stringify({
          bookings: bookingData,
          globalTodos
        })
      );
    } catch(err){
      console.error("localStorage save failed:", err);
    }
  },[bookings, globalTodos]);

  // ── Action handlers (update state + write to Firebase) ──
  function upd(id,fn){
    setBookings(prev=>{
      const next=prev.map(b=>b.id!==id?b:fn(b));
      fbSaveBookings(db,next);
      return next;
    });
  }
  const updField=(id,k,v)=>upd(id,b=>({...b,[k]:v}));
  const toggleTodo=(bid,tid)=>upd(bid,b=>({...b,todos:b.todos.map(t=>t.id===tid?{...t,done:!t.done}:t)}));
  const delTodo=(bid,tid)=>upd(bid,b=>({...b,todos:b.todos.filter(t=>t.id!==tid)}));
  const addTodo=(bid)=>{
    const txt=(newTodo[bid]||"").trim();if(!txt)return;
    upd(bid,b=>({...b,todos:[...b.todos,{id:Date.now(),text:txt,done:false}]}));
    setNewTodo(p=>({...p,[bid]:""}));
  };
  const toggleStatus=id=>upd(id,b=>({...b,statusType:b.statusType==="confirmed"?"pending":"confirmed"}));

  const toggleGlobal=id=>{const next=globalTodos.map(t=>t.id===id?{...t,done:!t.done}:t);setGlobalTodos(next);fbSaveGlobalTodos(db,next);};
  const delGlobal=id=>{const next=globalTodos.filter(t=>t.id!==id);setGlobalTodos(next);fbSaveGlobalTodos(db,next);};
  const addGlobal=()=>{
    const txt=newGlobalTodo.trim();if(!txt)return;
    const next=[...globalTodos,{id:Date.now(),text:txt,done:false}];
    setGlobalTodos(next);fbSaveGlobalTodos(db,next);setNewGlobalTodo("");
  };

  const totalWarn=bookings.reduce((s,b)=>s+getActiveWarnings(b).filter(w=>!w.isResolved).length,0);
  const openTodos=bookings.reduce((s,b)=>s+b.todos.filter(t=>!t.done).length,0);
  const doneTodos=bookings.reduce((s,b)=>s+b.todos.filter(t=>t.done).length,0);
  const pending=bookings.filter(b=>b.statusType==="pending").length;

  // ── Sync status indicator ──
  const syncColor=syncStatus==="live"?"#3ab870":syncStatus==="error"?"#e05020":"#e0a020";
  const syncLabel=syncStatus==="live"?"● Live":syncStatus==="error"?"● Verbindungsfehler":"● Verbinde…";

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#dde8f0 0%,#eef2f6 60%,#e6eef5 100%)"}}>

      {/* HEADER */}
      <div className="header-wrap" style={{padding:"0 20px 14px",borderBottom:"1px solid rgba(0,0,0,0.08)",background:"rgba(255,255,255,0.82)",backdropFilter:"blur(18px)",WebkitBackdropFilter:"blur(18px)",position:"sticky",top:0,zIndex:50,boxShadow:"0 1px 12px rgba(0,60,100,0.07)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,paddingTop:14}}>
          <div>
            <div style={{fontSize:9,letterSpacing:4,textTransform:"uppercase",color:"#7aaabb",marginBottom:3}}>Tourenplanung · 2026</div>
            <h1 style={{fontSize:"clamp(16px,4vw,28px)",fontWeight:"normal",color:"#1a2e3a",letterSpacing:0.5}}>
              Hüttentouren <span style={{color:"#3a8aaa"}}>Mai – Juni</span>
            </h1>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <div style={{fontSize:10,color:syncColor,letterSpacing:0.5,marginRight:4}}>{syncLabel}</div>
            {[
              {label:"Etappen",v:bookings.length,c:"#2a6080"},
              {label:"Offen",v:pending,c:pending>0?"#c07020":"#4a9a70"},
              {label:"⚠",v:totalWarn,c:totalWarn>0?"#c04020":"#4a9a70"},
              {label:"To-Dos",v:openTodos,c:openTodos>0?"#3a6aaa":"#4a9a70"},
              {label:"✓",v:doneTodos,c:"#2a8a60"},
            ].map(s=>(
              <div key={s.label} style={{background:"#fff",border:"1px solid rgba(0,0,0,0.08)",borderRadius:9,padding:"6px 12px",textAlign:"center",minWidth:46,boxShadow:"0 1px 4px rgba(0,60,100,0.06)"}}>
                <div style={{fontSize:18,fontWeight:"bold",color:s.c,lineHeight:1}}>{s.v}</div>
                <div className="stat-label" style={{fontSize:8,color:"#8aacb8",letterSpacing:1,textTransform:"uppercase",marginTop:2}}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="content-wrap" style={{padding:"18px 18px 32px",maxWidth:1500,margin:"0 auto"}}>

        {/* GANTT */}
        <div className="gantt-scroll" style={{marginBottom:22}}>
          <div style={{background:"#fff",border:"1px solid rgba(0,0,0,0.08)",borderRadius:14,overflow:"hidden",minWidth:480,boxShadow:"0 2px 12px rgba(0,60,100,0.06)"}}>
            <div style={{display:"grid",gridTemplateColumns:"160px repeat("+TOTAL+",1fr)",borderBottom:"1px solid rgba(0,0,0,0.07)",background:"rgba(0,60,100,0.03)"}}>
              <div style={{padding:"9px 14px",fontSize:9,color:"#8aacb8",letterSpacing:2,textTransform:"uppercase"}}>Unterkunft</div>
              {DAYS.slice(0,TOTAL).map((day,i)=>(
                <div key={day.d} style={{padding:"6px 4px",textAlign:"center",borderLeft:"1px solid rgba(0,0,0,0.05)"}}>
                  <div style={{fontSize:9,color:"#8aacb8",letterSpacing:1,textTransform:"uppercase"}}>{day.w}</div>
                  <div style={{fontSize:11,color:i%2===0?"#3a7a9a":"#5a9ab8",fontWeight:"bold",marginTop:1}}>{day.d}</div>
                </div>
              ))}
            </div>
            {bookings.map((b,ri)=>{
              const si=getDI(b.checkIn),ei=getDI(b.checkOut);
              const hasWarn=getActiveWarnings(b).some(w=>!w.isResolved);
              return(
                <div key={b.id} style={{display:"grid",gridTemplateColumns:"160px repeat("+TOTAL+",1fr)",borderBottom:ri<bookings.length-1?"1px solid rgba(0,0,0,0.05)":"none",background:ri%2===0?"rgba(0,60,100,0.015)":"transparent"}}>
                  <div style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:6,borderRight:"1px solid rgba(0,0,0,0.05)"}}>
                    <div style={{width:7,height:7,borderRadius:"50%",flexShrink:0,background:b.statusType==="confirmed"?"#3ab870":"#e0a020"}}/>
                    {hasWarn&&<span style={{fontSize:9}}>⚠</span>}
                    <span style={{fontSize:11.5,color:"#1a2e3a",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.name}</span>
                  </div>
                  {Array.from({length:TOTAL}).map((_,di)=>{
                    const inBar=di>=si&&di<ei,isStart=di===si,isEnd=di===ei-1;
                    return(
                      <div key={di} style={{borderLeft:"1px solid rgba(0,0,0,0.04)",position:"relative",height:40}}>
                        {inBar&&(
                          <div style={{position:"absolute",left:isStart?3:0,right:isEnd?3:0,top:"50%",transform:"translateY(-50%)",height:24,background:"linear-gradient(90deg,"+b.color+"ee,"+b.color+"bb)",borderRadius:isStart?"7px 0 0 7px":isEnd?"0 7px 7px 0":0,display:"flex",alignItems:"center",paddingLeft:isStart?8:0,fontSize:10,color:"#fff",fontWeight:"bold",whiteSpace:"nowrap",overflow:"hidden",boxShadow:"0 2px 6px "+b.color+"55"}}>
                            {isStart&&Number(b.pax)+"P"}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>

        {/* CARDS */}
        <div className="cards-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:14}}>
          {bookings.map((b,i)=>{
            const done=b.todos.filter(t=>t.done).length;
            const prog=b.todos.length>0?(done/b.todos.length)*100:100;
            const warnings=getActiveWarnings(b);
            return(
              <div key={b.id} className="card" style={{animationDelay:i*35+"ms",background:"#fff",border:"1px solid rgba(0,0,0,0.07)",borderTop:"3px solid "+b.color,borderRadius:14,padding:"16px 18px",display:"flex",flexDirection:"column",gap:11,boxShadow:"0 2px 12px rgba(0,60,100,0.06)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontSize:15,color:"#1a2e3a",marginBottom:2}}>{b.name}</div>
                    <div style={{fontSize:11,color:"#5a9aaa"}}>{fmtDate(b.checkIn)} → {fmtDate(b.checkOut)}</div>
                  </div>
                  <div className="status-btn" onClick={()=>toggleStatus(b.id)} style={{fontSize:9.5,letterSpacing:1.5,textTransform:"uppercase",padding:"4px 10px",borderRadius:20,whiteSpace:"nowrap",cursor:"pointer",background:b.statusType==="confirmed"?"rgba(58,184,112,0.1)":"rgba(220,160,30,0.12)",color:b.statusType==="confirmed"?"#2a8050":"#a06010",border:"1px solid "+(b.statusType==="confirmed"?"rgba(58,184,112,0.3)":"rgba(220,160,30,0.3)")}}>
                    {b.statusType==="confirmed"?"✓ Reserviert":"⏳ Offen"}
                  </div>
                </div>
                {warnings.length>0&&<div style={{display:"flex",flexDirection:"column",gap:5}}>{warnings.map(rule=><WarningBadge key={rule.id} rule={rule}/>)}</div>}
                {b.route&&(
                  <div style={{display:"flex",gap:0,borderRadius:10,overflow:"hidden",border:"1px solid rgba(0,60,100,0.1)"}}>
                    {[{icon:"📍",label:"Strecke",val:b.route.km.toFixed(1)+" km"},{icon:"↑",label:"Aufstieg",val:b.route.up+"m"},{icon:"↓",label:"Abstieg",val:b.route.down+"m"},{icon:"⛰",label:"Max",val:b.route.maxEle+"m"}].map((s,si)=>(
                      <div key={s.label} style={{flex:1,textAlign:"center",padding:"8px 4px",background:si%2===0?"rgba(0,60,100,0.04)":"rgba(0,60,100,0.02)",borderLeft:si>0?"1px solid rgba(0,60,100,0.08)":"none"}}>
                        <div style={{fontSize:13}}>{s.icon}</div>
                        <div style={{fontSize:13,fontWeight:"bold",color:"#1a4a6a",lineHeight:1.2}}>{s.val}</div>
                        <div style={{fontSize:8,color:"#8aacb8",letterSpacing:1,textTransform:"uppercase",marginTop:1}}>{s.label}</div>
                      </div>
                    ))}
                  </div>
                )}
                {GPX_FILES[b.id]&&(
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    <div style={{fontSize:8,color:"#8aacb8",letterSpacing:2,textTransform:"uppercase",marginBottom:1}}>GPX Download</div>
                    <button onClick={()=>downloadGpx(b.id,undefined)}
                      style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:6,width:"100%",background:"rgba(0,90,130,0.05)",border:"1px solid rgba(0,90,130,0.15)",borderRadius:8,padding:"7px 12px",color:"#3a7a9a",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif",transition:"all 0.2s"}}
                      onMouseEnter={e=>e.currentTarget.style.background="rgba(0,90,130,0.12)"}
                      onMouseLeave={e=>e.currentTarget.style.background="rgba(0,90,130,0.05)"}>
                      <span>⬇ {({1:"Route",2:"Route",3:"Opt. 2 – Original",4:"Route",5:"Route",6:"Opt. 2 – Direkt",7:"Opt. 1 – Original"})[b.id]||"Route"}</span>
                      <span style={{opacity:0.55,fontSize:10}}>{GPX_FILES[b.id].name}</span>
                    </button>
                    {GPX_ALT[b.id]&&(
                      <button onClick={()=>downloadGpx(b.id,"alt")}
                        style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:6,width:"100%",background:"rgba(0,90,130,0.05)",border:"1px solid rgba(0,90,130,0.15)",borderRadius:8,padding:"7px 12px",color:"#3a7a9a",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif",transition:"all 0.2s"}}
                        onMouseEnter={e=>e.currentTarget.style.background="rgba(0,90,130,0.12)"}
                        onMouseLeave={e=>e.currentTarget.style.background="rgba(0,90,130,0.05)"}>
                        <span>⬇ {GPX_ALT[b.id].label}</span>
                        <span style={{opacity:0.55,fontSize:10}}>{GPX_ALT[b.id].km}km ↑{GPX_ALT[b.id].up}m ↓{GPX_ALT[b.id].down}m</span>
                      </button>
                    )}
                  </div>
                )}
                <div style={{background:"rgba(0,60,100,0.03)",border:"1px solid rgba(0,60,100,0.07)",borderRadius:10,padding:"11px 13px",display:"flex",flexDirection:"column",gap:7}}>
                  <div style={{fontSize:8,color:"#8aacb8",letterSpacing:2.5,textTransform:"uppercase",marginBottom:1}}>Details · Klicken zum Bearbeiten</div>
                  {EDITABLE_FIELDS.filter(f=>f.key!=="bemerkung").map(f=>(
                    <div key={f.key} style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                      <span style={{fontSize:8.5,color:"#8aacb8",letterSpacing:1,textTransform:"uppercase",minWidth:76,paddingTop:3,flexShrink:0}}>{f.label}</span>
                      <div style={{flex:1,minWidth:0}}><EditableField value={b[f.key]} multiline={f.multiline} type={f.type} color={b.color} onSave={v=>updField(b.id,f.key,v)}/></div>
                    </div>
                  ))}
                </div>
                <div style={{border:"1px solid "+b.color+"55",borderRadius:10,padding:"11px 13px",background:"rgba(0,60,100,0.015)"}}>
                  <div style={{fontSize:8,color:"#8aacb8",letterSpacing:2.5,textTransform:"uppercase",marginBottom:6}}>Bemerkung · Klicken zum Bearbeiten</div>
                  <div style={{width:"100%"}}><EditableField value={b.bemerkung||""} multiline={true} color={b.color} onSave={v=>updField(b.id,"bemerkung",v)}/></div>
                </div>
                {b.todos.length>0&&(
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                      <span style={{fontSize:8,color:"#8aacb8",letterSpacing:2,textTransform:"uppercase"}}>To-Dos</span>
                      <span style={{fontSize:8,color:"#8aacb8"}}>{done}/{b.todos.length} erledigt</span>
                    </div>
                    <div style={{height:3,background:"rgba(0,0,0,0.07)",borderRadius:2,overflow:"hidden"}}>
                      <div style={{height:"100%",width:prog+"%",background:prog===100?"#3ab870":"linear-gradient(90deg,"+b.color+","+b.color+"99)",borderRadius:2,transition:"width 0.4s ease"}}/>
                    </div>
                  </div>
                )}
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {b.todos.length===0&&<div style={{fontSize:11,color:"#aabbc8",fontStyle:"italic"}}>Keine offenen To-Dos ✓</div>}
                  {b.todos.map(t=>(
                    <div key={t.id} className="todo-row" style={{display:"flex",alignItems:"flex-start",gap:8,padding:"5px 8px",borderRadius:7,background:t.done?"rgba(58,184,112,0.08)":"rgba(0,60,100,0.03)",transition:"background 0.2s"}}>
                      <div onClick={()=>toggleTodo(b.id,t.id)} style={{width:16,height:16,borderRadius:4,flexShrink:0,cursor:"pointer",marginTop:1,border:t.done?"2px solid #3ab870":"2px solid rgba(0,0,0,0.18)",background:t.done?"#3ab870":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",fontSize:10,color:"#fff",fontWeight:"bold",userSelect:"none",WebkitUserSelect:"none",WebkitTapHighlightColor:"transparent"}}>
                        {t.done?"✓":""}
                      </div>
                      <span style={{flex:1,fontSize:12,lineHeight:1.45,color:t.done?"#4a8060":"#1a3040",textDecoration:t.done?"line-through":"none",transition:"all 0.2s"}}>{t.text}</span>
                      <span className="del-btn" onClick={()=>delTodo(b.id,t.id)} style={{opacity:0,cursor:"pointer",fontSize:11,color:"#c04040",padding:"1px 4px",transition:"opacity 0.15s",flexShrink:0}}>✕</span>
                    </div>
                  ))}
                  <div style={{display:"flex",gap:6,marginTop:4}}>
                    <input className="add-input" placeholder="Neues To-Do …" value={newTodo[b.id]||""} onChange={e=>setNewTodo(p=>({...p,[b.id]:e.target.value}))} onKeyDown={e=>{if(e.key==="Enter")addTodo(b.id);}}/>
                    <button className="add-btn" onClick={()=>addTodo(b.id)}>+</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* GLOBAL TODOS */}
        <div style={{marginTop:22,background:"#fff",border:"1px solid rgba(0,0,0,0.08)",borderRadius:14,padding:"16px 20px",boxShadow:"0 2px 12px rgba(0,60,100,0.06)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <div>
              <div style={{fontSize:9,color:"#8aacb8",letterSpacing:2.5,textTransform:"uppercase",marginBottom:2}}>Allgemein</div>
              <div style={{fontSize:14,color:"#1a2e3a"}}>Globale To-Dos</div>
            </div>
            {globalTodos.length>0&&<div style={{fontSize:10,color:"#8aacb8"}}>{globalTodos.filter(t=>t.done).length}/{globalTodos.length} erledigt</div>}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {globalTodos.length===0&&<div style={{fontSize:11,color:"#aabbc8",fontStyle:"italic",padding:"4px 0"}}>Noch keine globalen To-Dos</div>}
            {globalTodos.map(t=>(
              <div key={t.id} className="todo-row" style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:7,background:t.done?"rgba(58,184,112,0.07)":"rgba(0,60,100,0.03)",transition:"background 0.2s"}}>
                <div onClick={()=>toggleGlobal(t.id)} style={{width:16,height:16,borderRadius:4,flexShrink:0,cursor:"pointer",border:t.done?"2px solid #3ab870":"2px solid rgba(0,0,0,0.18)",background:t.done?"#3ab870":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",fontSize:10,color:"#fff",fontWeight:"bold",userSelect:"none",WebkitUserSelect:"none",WebkitTapHighlightColor:"transparent"}}>
                  {t.done?"✓":""}
                </div>
                <span style={{flex:1,fontSize:12,lineHeight:1.4,color:t.done?"#4a8060":"#1a3040",textDecoration:t.done?"line-through":"none",transition:"all 0.2s"}}>{t.text}</span>
                <span className="del-btn" onClick={()=>delGlobal(t.id)} style={{opacity:0,cursor:"pointer",fontSize:11,color:"#c04040",padding:"1px 4px",transition:"opacity 0.15s",flexShrink:0}}>✕</span>
              </div>
            ))}
            <div style={{display:"flex",gap:6,marginTop:6}}>
              <input className="add-input" placeholder="Neues globales To-Do …" value={newGlobalTodo} onChange={e=>setNewGlobalTodo(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addGlobal();}}/>
              <button className="add-btn" onClick={addGlobal}>+</button>
            </div>
          </div>
        </div>

        {/* FOOTER */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginTop:24,paddingTop:16,borderTop:"1px solid rgba(0,0,0,0.07)"}}>
          <div style={{fontSize:10,color:syncColor,letterSpacing:0.5}}>{syncLabel} · Änderungen für alle sichtbar</div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
